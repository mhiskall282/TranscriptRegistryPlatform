############################
# DEFAULT PROFILE
############################
[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.23"
ffi = true

# Optimizer
optimizer = true
optimizer_runs = 200

# OpenZeppelin remappings
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/"
]

############################
# FUZZ & INVARIANT TESTING
############################
[profile.default.fuzz]
runs = 256

[profile.default.invariant]
runs = 256
depth = 15

############################
# FORMATTER
############################
[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
multiline_func_header = "all"
quote_style = "double"
number_underscore = "thousands"

############################
# RPC ENDPOINTS
############################
[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
base_sepolia = "https://sepolia.base.org"

############################
# BLOCK EXPLORER KEYS
############################
[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
base_sepolia = { key = "${BASESCAN_API_KEY}" }

############################
# CI PROFILE (GitHub Actions)
############################
[profile.ci]
verbosity = 3
gas_reports = ["*"]

[profile.ci.fuzz]
runs = 512

############################
# COVERAGE PROFILE
############################
[profile.coverage]
via_ir = false
optimizer = false
no_match_path = "src/UniversityFactoryBeacon.sol|script/TestDeployedContracts.s.sol"